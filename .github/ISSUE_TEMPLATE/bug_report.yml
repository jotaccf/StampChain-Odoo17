name: Bug Report
description: Report a bug in StampChain
labels: ["bug"]
body:
  - type: dropdown
    id: version
    attributes:
      label: StampChain Version
      options:
        - 17.0.1.0.0
        - 17.0.0.2.0
        - 17.0.0.1.0
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - FIFO / Stamp reservation
        - INCM Reception
        - Breakdown / Recovery
        - Expedition trigger
        - Wisedat integration
        - Dashboard / UI
        - Security / Permissions
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: Describe what happened
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Odoo Logs
      render: shell
